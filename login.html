<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flag Quiz — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0e17;
      --surface: #1a1828;
      --surface2: #231f38;
      --accent: #f7c948;
      --green: #2ecc71;
      --red: #e74c3c;
      --weekly: #a78bfa;
      --weekly-dark: #7c3aed;
      --weekly-glow: rgba(167,139,250,0.25);
      --text: #fffffe;
      --muted: #a7a4c0;
      --radius: 18px;
      --font-display: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
      overflow-x: hidden;
    }

    /* Background blobs */
    .bg-blob-1 {
      position: fixed; top: -150px; left: -100px;
      width: 500px; height: 500px; border-radius: 50%;
      background: radial-gradient(circle, rgba(247,201,72,0.1) 0%, transparent 65%);
      pointer-events: none; z-index: 0;
    }
    .bg-blob-2 {
      position: fixed; bottom: -100px; right: -100px;
      width: 400px; height: 400px; border-radius: 50%;
      background: radial-gradient(circle, rgba(124,58,237,0.12) 0%, transparent 65%);
      pointer-events: none; z-index: 0;
    }

    .login-wrap {
      position: relative; z-index: 1;
      width: 100%; max-width: 420px;
      display: flex; flex-direction: column;
      align-items: center; gap: 0;
    }

    /* Logo */
    .logo-wrap {
      display: flex; flex-direction: column;
      align-items: center; gap: 6px;
      margin-bottom: 32px;
      animation: fadeUp 0.5s ease both;
    }
    .logo-icon { font-size: 52px; animation: bounce 2s ease-in-out infinite; }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
    .logo-title { font-family: var(--font-display); font-size: 40px; font-weight: 800; letter-spacing: -1px; }
    .logo-title span { color: var(--accent); }
    .logo-sub { font-size: 13px; color: var(--muted); margin-top: 4px; }

    /* Card */
    .card {
      width: 100%;
      background: var(--surface);
      border: 1.5px solid rgba(255,255,255,0.07);
      border-radius: 24px;
      padding: 32px 28px;
      animation: fadeUp 0.5s 0.1s ease both;
    }

    /* Tabs */
    .tabs {
      display: flex;
      background: var(--surface2);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 28px;
    }
    .tab {
      flex: 1; padding: 10px;
      background: transparent; border: none;
      border-radius: 9px;
      font-family: var(--font-display); font-size: 15px; font-weight: 700;
      color: var(--muted); cursor: pointer;
      transition: all 0.2s ease;
    }
    .tab.active {
      background: var(--accent); color: #0f0e17;
    }

    /* Form fields */
    .field { margin-bottom: 16px; }
    .field label {
      display: block; font-size: 12px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 1.2px;
      color: var(--muted); margin-bottom: 8px;
    }
    .field input {
      width: 100%;
      background: var(--surface2);
      border: 2px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 14px 16px;
      color: var(--text);
      font-family: var(--font-body); font-size: 15px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(247,201,72,0.12);
    }
    .field input::placeholder { color: var(--muted); }
    .field input.error-input { border-color: var(--red); }

    /* Submit button */
    .submit-btn {
      width: 100%; margin-top: 8px;
      background: var(--accent); color: #0f0e17;
      border: none; border-radius: 14px;
      padding: 17px;
      font-family: var(--font-display); font-size: 18px; font-weight: 800;
      cursor: pointer; transition: all 0.2s ease;
      box-shadow: 0 4px 20px rgba(247,201,72,0.3);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(247,201,72,0.45); }
    .submit-btn:active { transform: scale(0.98); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Divider */
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 20px 0; color: var(--muted); font-size: 12px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px;
      background: rgba(255,255,255,0.08);
    }

    /* Guest button */
    .guest-btn {
      width: 100%;
      background: transparent;
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 14px; padding: 15px;
      color: var(--muted);
      font-family: var(--font-display); font-size: 16px; font-weight: 700;
      cursor: pointer; transition: all 0.2s ease;
    }
    .guest-btn:hover { border-color: rgba(255,255,255,0.25); color: var(--text); }

    /* Error / success messages */
    .msg-box {
      width: 100%; border-radius: 12px;
      padding: 12px 16px; font-size: 13px; font-weight: 500;
      margin-bottom: 16px; display: none;
      animation: fadeUp 0.3s ease;
    }
    .msg-box.error   { background: rgba(231,76,60,0.15); border: 1.5px solid rgba(231,76,60,0.4); color: #ff8a80; display: block; }
    .msg-box.success { background: rgba(46,204,113,0.15); border: 1.5px solid rgba(46,204,113,0.4); color: #69f0ae; display: block; }

    /* Spinner */
    .spinner {
      width: 18px; height: 18px;
      border: 2.5px solid rgba(0,0,0,0.3);
      border-top-color: #0f0e17;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Password strength */
    .pw-strength { margin-top: 6px; display: none; }
    .pw-bar-outer { height: 4px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
    .pw-bar-inner { height: 100%; border-radius: 99px; transition: width 0.3s, background 0.3s; }
    .pw-label { font-size: 11px; color: var(--muted); margin-top: 4px; }

    /* Already logged in banner */
    .logged-in-banner {
      width: 100%; background: rgba(46,204,113,0.12);
      border: 1.5px solid rgba(46,204,113,0.35);
      border-radius: 14px; padding: 16px 18px;
      display: none; flex-direction: column; gap: 10px;
      animation: fadeUp 0.4s ease;
      margin-bottom: 16px;
    }
    .logged-in-banner .li-top { display: flex; align-items: center; gap: 10px; }
    .logged-in-banner .li-avatar {
      width: 38px; height: 38px; border-radius: 50%;
      background: linear-gradient(135deg, var(--weekly-dark), var(--weekly));
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 800; flex-shrink: 0;
      font-family: var(--font-display);
    }
    .logged-in-banner .li-info { flex: 1; }
    .logged-in-banner .li-name { font-family: var(--font-display); font-size: 16px; font-weight: 700; color: var(--green); }
    .logged-in-banner .li-email { font-size: 12px; color: var(--muted); }
    .logged-in-banner .play-now-btn {
      width: 100%; background: var(--accent); color: #0f0e17;
      border: none; border-radius: 12px; padding: 14px;
      font-family: var(--font-display); font-size: 17px; font-weight: 800;
      cursor: pointer; transition: all 0.2s;
    }
    .logged-in-banner .play-now-btn:hover { transform: translateY(-1px); }
    .logged-in-banner .signout-link {
      text-align: center; font-size: 12px; color: var(--muted);
      cursor: pointer; text-decoration: underline;
      background: none; border: none;
    }
    .logged-in-banner .signout-link:hover { color: var(--text); }

    /* Footer note */
    .footer-note {
      margin-top: 20px; font-size: 12px; color: var(--muted);
      text-align: center; animation: fadeUp 0.5s 0.2s ease both;
    }
    .footer-note a { color: var(--accent); text-decoration: none; }
    .footer-note a:hover { text-decoration: underline; }

    @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  </style>
</head>
<body>
  <div class="bg-blob-1"></div>
  <div class="bg-blob-2"></div>

  <div class="login-wrap">
    <div class="logo-wrap">
      <span class="logo-icon">🌍</span>
      <h1 class="logo-title">Flag<span>Quiz</span></h1>
      <p class="logo-sub">Sign in to compete on the global leaderboard</p>
    </div>

    <!-- Already logged in state -->
    <div class="logged-in-banner" id="logged-in-banner">
      <div class="li-top">
        <div class="li-avatar" id="li-avatar">?</div>
        <div class="li-info">
          <div class="li-name" id="li-name">Player</div>
          <div class="li-email" id="li-email">email@example.com</div>
        </div>
      </div>
      <button class="play-now-btn" onclick="goToQuiz()">🎮 Play Now</button>
      <button class="signout-link" id="signout-btn">Sign out</button>
    </div>

    <div class="card" id="auth-card">
      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active" id="tab-signin" onclick="switchTab('signin')">Sign In</button>
        <button class="tab" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
      </div>

      <!-- Message box -->
      <div class="msg-box" id="msg-box"></div>

      <!-- SIGN IN FORM -->
      <div id="form-signin">
        <div class="field">
          <label>Email</label>
          <input type="email" id="si-email" placeholder="you@example.com" autocomplete="email" />
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="si-password" placeholder="Your password" autocomplete="current-password" />
        </div>
        <button class="submit-btn" id="si-btn" onclick="signIn()">
          <div class="spinner" id="si-spinner"></div>
          <span id="si-btn-text">Sign In →</span>
        </button>
      </div>

      <!-- SIGN UP FORM -->
      <div id="form-signup" style="display:none">
        <div class="field">
          <label>Username</label>
          <input type="text" id="su-username" placeholder="Your display name" maxlength="20" autocomplete="off" />
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" id="su-email" placeholder="you@example.com" autocomplete="email" />
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="su-password" placeholder="At least 6 characters" autocomplete="new-password" />
          <div class="pw-strength" id="pw-strength">
            <div class="pw-bar-outer"><div class="pw-bar-inner" id="pw-bar"></div></div>
            <div class="pw-label" id="pw-label"></div>
          </div>
        </div>
        <button class="submit-btn" id="su-btn" onclick="signUp()">
          <div class="spinner" id="su-spinner"></div>
          <span id="su-btn-text">Create Account →</span>
        </button>
      </div>

      <div class="divider">or</div>
      <button class="guest-btn" onclick="playAsGuest()">👤 Play as Guest</button>
    </div>

    <p class="footer-note">
      Scores are saved to the global leaderboard when signed in.<br>
      Guests can play but won't appear on the leaderboard.
    </p>
  </div>

  <script src="supabase-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // ===== INIT SUPABASE =====
    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

    // ===== TAB SWITCH =====
    function switchTab(tab) {
      document.getElementById('form-signin').style.display = tab === 'signin' ? 'block' : 'none';
      document.getElementById('form-signup').style.display = tab === 'signup' ? 'block' : 'none';
      document.getElementById('tab-signin').classList.toggle('active', tab === 'signin');
      document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
      clearMsg();
    }

    // ===== MESSAGE =====
    function showMsg(text, type = 'error') {
      const box = document.getElementById('msg-box');
      box.textContent = text;
      box.className = `msg-box ${type}`;
    }
    function clearMsg() {
      const box = document.getElementById('msg-box');
      box.className = 'msg-box';
      box.textContent = '';
    }

    // ===== LOADING STATE =====
    function setLoading(formId, loading) {
      const btn     = document.getElementById(`${formId}-btn`);
      const spinner = document.getElementById(`${formId}-spinner`);
      const text    = document.getElementById(`${formId}-btn-text`);
      btn.disabled        = loading;
      spinner.style.display = loading ? 'block' : 'none';
      text.style.opacity  = loading ? '0' : '1';
    }

    // ===== PASSWORD STRENGTH =====
    document.getElementById('su-password').addEventListener('input', function() {
      const pw  = this.value;
      const str = document.getElementById('pw-strength');
      const bar = document.getElementById('pw-bar');
      const lbl = document.getElementById('pw-label');
      if (!pw) { str.style.display = 'none'; return; }
      str.style.display = 'block';
      let score = 0;
      if (pw.length >= 6)  score++;
      if (pw.length >= 10) score++;
      if (/[A-Z]/.test(pw)) score++;
      if (/[0-9]/.test(pw)) score++;
      if (/[^A-Za-z0-9]/.test(pw)) score++;
      const levels = [
        { w:'20%', bg:'#e74c3c', label:'Too short' },
        { w:'40%', bg:'#e67e22', label:'Weak' },
        { w:'60%', bg:'#f1c40f', label:'Fair' },
        { w:'80%', bg:'#2ecc71', label:'Good' },
        { w:'100%',bg:'#27ae60', label:'Strong' },
      ];
      const lvl = levels[Math.max(0, score-1)];
      bar.style.width      = lvl.w;
      bar.style.background = lvl.bg;
      lbl.textContent      = lvl.label;
      lbl.style.color      = lvl.bg;
    });

    // ===== SIGN IN =====
    async function signIn() {
      clearMsg();
      const email    = document.getElementById('si-email').value.trim();
      const password = document.getElementById('si-password').value;
      if (!email || !password) { showMsg('Please fill in all fields.'); return; }
      setLoading('si', true);
      const { data, error } = await sb.auth.signInWithPassword({ email, password });
      setLoading('si', false);
      if (error) { showMsg(error.message); return; }
      // Save username to localStorage for quiz use
      const username = data.user.user_metadata?.username || email.split('@')[0];
      localStorage.setItem('flagquiz_playername', username);
      localStorage.setItem('flagquiz_userid', data.user.id);
      goToQuiz();
    }

    // ===== SIGN UP =====
    async function signUp() {
      clearMsg();
      const username = document.getElementById('su-username').value.trim();
      const email    = document.getElementById('su-email').value.trim();
      const password = document.getElementById('su-password').value;
      if (!username || !email || !password) { showMsg('Please fill in all fields.'); return; }
      if (username.length < 2) { showMsg('Username must be at least 2 characters.'); return; }
      if (password.length < 6) { showMsg('Password must be at least 6 characters.'); return; }
      setLoading('su', true);
      const { data, error } = await sb.auth.signUp({
        email, password,
        options: { data: { username } }
      });
      setLoading('su', false);
      if (error) { showMsg(error.message); return; }
      if (data.user && !data.session) {
        // Email confirmation required
        showMsg('✅ Check your email to confirm your account, then sign in!', 'success');
        switchTab('signin');
        return;
      }
      localStorage.setItem('flagquiz_playername', username);
      localStorage.setItem('flagquiz_userid', data.user.id);
      goToQuiz();
    }

    // ===== GUEST =====
    function playAsGuest() {
      localStorage.removeItem('flagquiz_userid');
      // Keep any existing username or set default
      if (!localStorage.getItem('flagquiz_playername')) {
        localStorage.setItem('flagquiz_playername', 'Guest');
      }
      goToQuiz();
    }

    // ===== SIGN OUT =====
    document.getElementById('signout-btn').addEventListener('click', async () => {
      await sb.auth.signOut();
      localStorage.removeItem('flagquiz_userid');
      document.getElementById('logged-in-banner').style.display = 'none';
      document.getElementById('auth-card').style.display = 'block';
    });

    // ===== NAVIGATE =====
    function goToQuiz() {
      window.location.href = 'index.html';
    }

    // ===== CHECK EXISTING SESSION =====
    (async function checkSession() {
      const { data: { session } } = await sb.auth.getSession();
      if (session) {
        const user     = session.user;
        const username = user.user_metadata?.username || user.email.split('@')[0];
        localStorage.setItem('flagquiz_playername', username);
        localStorage.setItem('flagquiz_userid', user.id);

        // Show logged-in state
        const banner = document.getElementById('logged-in-banner');
        banner.style.display = 'flex';
        document.getElementById('auth-card').style.display = 'none';
        document.getElementById('li-name').textContent  = username;
        document.getElementById('li-email').textContent = user.email;
        document.getElementById('li-avatar').textContent = username.charAt(0).toUpperCase();
      }
    })();

    // Enter key submits active form
    document.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      const signinVisible = document.getElementById('form-signin').style.display !== 'none';
      if (signinVisible) signIn(); else signUp();
    });
  </script>
</body>
</html>
